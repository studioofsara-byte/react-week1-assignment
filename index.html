<!DOCTYPE html>
<html>
<head>
    <title>My First Website</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>My Website</h1>
    <p>Welcome to my first webpage</p>
</header>

<section id="about">
    <h2>About</h2>
    <p>This website is created for React Bootcamp assignment.</p>
</section>

<section id="services">
    <h2>Services</h2>
    <ul>
        <li>Web Design</li>
        <li>Frontend Development</li>

<footer>

</footer>

<script src="script.js"></script>
